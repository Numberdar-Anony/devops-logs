version: "3.9"

services:
  db:
    image: postgres:16
    container_name: devops-logs-db
    environment:
      POSTGRES_DB: devops_logs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: devops-logs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: .
    container_name: devops-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/devops_logs
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      KUBECONFIG: /app/.kube/devops-logs-config
    volumes:
      - .:/app
      - ./.kube:/app/.kube
      - ./shared_logs:/shared
      - ./scripts:/app/scripts
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

  celery-worker:
    build: .
    container_name: devops-celery-worker
    command: ["celery", "-A", "app.celery_app.celery", "worker", "--loglevel=info", "--concurrency=1"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/devops_logs
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      KUBECONFIG: /app/.kube/devops-logs-config
    volumes:
      - .:/app
      - ./.kube:/app/.kube
      - ./shared_logs:/shared
      - ./scripts:/app/scripts
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: devops-celery-beat
    command: ["celery", "-A", "app.celery_app.celery", "beat", "--loglevel=info"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/devops_logs
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      KUBECONFIG: /app/.kube/devops-logs-config
    volumes:
      - .:/app
      - ./.kube:/app/.kube
      - ./shared_logs:/shared
      - ./scripts:/app/scripts
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    container_name: devops-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./jenkins-config/init.groovy.d:/usr/share/jenkins/ref/init.groovy.d:ro
    restart: unless-stopped

  terraform-simulator:
    image: python:3.12-slim
    container_name: devops-terraform-simulator
    volumes:
      - ./simulators/terraform:/app
      - shared_logs:/shared
    working_dir: /app
    command: python generate_logs.py
    restart: unless-stopped

  argocd-mock:
    image: python:3.12-slim
    container_name: devops-argocd-mock
    ports:
      - "5001:5000"
    volumes:
      - ./argocd:/app
    working_dir: /app
    command: sh -c "pip install fastapi uvicorn && uvicorn mock_api:app --host 0.0.0.0 --port 5000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: devops-frontend
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      - backend
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: devops-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: devops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: devops-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  jenkins_home:
  shared_logs:
