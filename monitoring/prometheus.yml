global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'celery-worker'
    static_configs:
      - targets: ['celery-worker:8000'] # Assuming we'll expose metrics there if possible or similar
